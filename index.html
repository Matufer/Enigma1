<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma Investigaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --text: #f0ece0;
    --muted: #666;
    --danger: #c0392b;
    --green: #22c55e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(34,197,94,0.02) 80px, rgba(34,197,94,0.02) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(34,197,94,0.02) 80px, rgba(34,197,94,0.02) 81px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 420px;
    text-align: center;
  }

  .logo-area {
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .qmark-logo {
    width: 100px;
    height: 100px;
    margin: 0 auto;
    border-radius: 50%;
    background: rgba(34,197,94,0.06);
    border: 1.5px solid rgba(34,197,94,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(34,197,94,0.1);
  }

  .qmark-logo span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: var(--green);
    line-height: 1;
    display: block;
    margin-top: 6px;
    text-shadow: 0 0 20px rgba(34,197,94,0.4);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 36px 32px;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    font-weight: 400;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .input-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 10px;
    text-align: center;
    padding: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus { border-color: rgba(34,197,94,0.4); }
  .input-wrap input.shake {
    border-color: var(--danger);
    animation: shake 0.35s ease;
  }

  .btn-enter {
    width: 100%;
    background: var(--green);
    color: #0a0a0a;
    border: none;
    border-radius: 2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 15px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-enter:hover { opacity: 0.88; }
  .btn-enter:active { transform: scale(0.98); }
  .btn-enter:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    font-size: 12px;
    color: var(--danger);
    letter-spacing: 1px;
    margin-top: 14px;
    height: 16px;
    transition: opacity 0.2s;
    opacity: 0;
  }

  .error-msg.visible { opacity: 1; }

  .links-section {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .links-section.visible { display: block; }

  .welcome {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .social-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 18px 20px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.1s;
    cursor: pointer;
  }

  .social-btn:hover { transform: translateX(4px); }
  .social-btn.wa:hover { border-color: #25D366; }
  .social-btn.ig:hover { border-color: #e1306c; }
  .social-btn.fb:hover { border-color: #1877f2; }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .wa .btn-icon { background: rgba(37,211,102,0.1); }
  .wa .btn-icon svg { stroke: #25D366; }
  .ig .btn-icon { background: rgba(225,48,108,0.1); }
  .ig .btn-icon svg { stroke: #e1306c; }
  .fb .btn-icon { background: rgba(24,119,242,0.1); }
  .fb .btn-icon svg { stroke: #1877f2; }
  .web .btn-icon { background: rgba(34,197,94,0.1); }
  .web .btn-icon svg { stroke: #22c55e; }
  .social-btn.web:hover { border-color: #22c55e; }

  .btn-text { text-align: left; }
  .btn-name { font-size: 14px; font-weight: 500; display: block; }
  .btn-handle { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }

  .arrow {
    margin-left: auto;
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s;
  }

  .social-btn:hover .arrow { transform: translateX(3px); color: var(--text); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<div class="container">

  <div id="login-view">
    <div class="logo-area">
      <div class="qmark-logo"><span>?</span></div>
    </div>
    <div class="card">
      <p class="card-label">Acceso restringido</p>
      <div class="input-wrap">
        <input type="password" id="pwd" maxlength="10" placeholder="····" autofocus />
      </div>
      <button class="btn-enter" id="btn" onclick="verificar()">Ingresar</button>
      <p class="error-msg" id="error">Contraseña incorrecta</p>
    </div>
  </div>

  <div class="links-section" id="links-section">
    <div class="logo-area">
      <div class="qmark-logo"><span>?</span></div>
    </div>
    <p class="welcome">Seleccioná un canal</p>
    <div class="social-btns" id="social-btns"></div>
  </div>

</div>

<script>
  const icons = {
    web: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    wa: `<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`,
    ig: `<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`,
    fb: `<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`
  };

  async function verificar() {
    const input = document.getElementById("pwd");
    const error = document.getElementById("error");
    const btn = document.getElementById("btn");

    btn.disabled = true;
    btn.textContent = "...";

    try {
      const res = await fetch("/.netlify/functions/auth", {
        method: "POST",
        body: JSON.stringify({ password: input.value })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById("login-view").style.display = "none";
        const container = document.getElementById("social-btns");
        container.innerHTML = data.links.map(link => `
          <a class="social-btn ${link.id}" href="${link.url}" target="_blank">
            <div class="btn-icon">${icons[link.id]}</div>
            <div class="btn-text">
              <span class="btn-name">${link.name}</span>
              <span class="btn-handle">${link.handle}</span>
            </div>
            <span class="arrow">›</span>
          </a>
        `).join("");
        document.getElementById("links-section").classList.add("visible");
      } else {
        input.classList.add("shake");
        error.classList.add("visible");
        input.value = "";
        setTimeout(() => input.classList.remove("shake"), 400);
      }
    } catch(e) {
      error.textContent = "Error de conexión";
      error.classList.add("visible");
    }

    btn.disabled = false;
    btn.textContent = "Ingresar";
  }

  document.getElementById("pwd").addEventListener("keydown", function(e) {
    if (e.key === "Enter") verificar();
    document.getElementById("error").classList.remove("visible");
  });
</script>
</body>
</html>
